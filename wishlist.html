<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Archive | VAULT 00</title>
    <link rel="stylesheet" href="style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syncopate:wght@400;700&display=swap');

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            background: #fff;
            padding-top: 80px;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ── HEADER ── */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: #EEEBE5;
            z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 22px 0;
        }
        .header-container {
            max-width: 100%;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 0 24px;
        }
        .logo {
            grid-column: 2;
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(14px, 3vw, 20px);
            font-weight: 700;
            letter-spacing: 3px;
            text-decoration: none;
            color: #000;
            text-align: center;
            text-transform: uppercase;
        }
        nav {
            grid-column: 1;
            display: flex;
            gap: 20px;
            justify-content: flex-start;
        }
        nav a {
            text-decoration: none;
            color: #000;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-height: 44px;
            display: flex;
            align-items: center;
        }

        /* ── CONTAINER ── */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        /* ── ACTION BUTTONS ── */
        #wishlist-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .pill-btn {
            background: #EEEBE5;
            color: #000;
            border: 1px solid #000;
            padding: 14px 30px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 44px;
            white-space: nowrap;
        }
        .pill-btn:hover { background: #e5e2db; transform: translateY(-2px); }

        /* ── PRODUCT GRID ── */
        #wishlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            column-gap: 30px;
            row-gap: 60px;
            transition: opacity 0.3s;
        }

        .product-card { position: relative; background: #fff; }

        .image-container {
            position: relative;
            width: 100%;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .product-image {
            width: 100%;
            height: auto;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }
        .image-container:hover .product-image { transform: scale(1.04); }

        /* Shimmer */
        .image-container::after {
            content:""; position:absolute; top:0; left:-150%; width:100%; height:100%;
            background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);
            transform:skewX(-25deg); transition:0.6s; pointer-events:none;
        }
        .image-container:hover::after { left:150%; }

        /* Heart */
        .heart-btn {
            background: #fff;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: red;
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 10;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            min-width: 44px;
            min-height: 44px;
            width: 44px;
            height: 44px;
        }

        /* Quick Add */
        .quick-add-btn {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #EEEBE5;
            color: #000;
            padding: 9px 18px;
            border: 1px solid #000;
            border-radius: 50px;
            font-weight: bold;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.3s ease, background-color 0.3s ease;
            opacity: 0;
            white-space: nowrap;
            z-index: 10;
            min-height: 36px;
        }
        .image-container:hover .quick-add-btn { opacity: 1; }
        .quick-add-btn:hover { background-color: #D6D3CC; }

        /* View btn — matches .add-btn from index */
        .view-btn {
            background-color: #EEEBE5;
            color: #000;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 16px 0;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 2px solid #000;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 14px;
            transition: background-color 0.3s;
            font-family: inherit;
            width: 100%;
            min-height: 52px;
        }
        .view-btn:hover { background-color: #D1CEC7; }

        /* ── CART SIDEBAR ── */
        .cart-sidebar {
            position: fixed;
            right: -100%;
            top: 0;
            width: 100%;
            max-width: 400px;
            height: 100%;
            background: white;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            transition: 0.4s ease;
            z-index: 10002;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }
        .cart-sidebar.open { right: 0; }
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.3); display:none; z-index:10001; }
        .overlay.active { display:block; }

        /* ── TOAST ── */
        #toast-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10005;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 90%;
            max-width: 340px;
        }
        .toast {
            background: #EEEBE5; color: #000; padding: 12px 24px;
            font-size: 10px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase;
            border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            opacity: 0; transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
            text-align: center; width: 100%;
        }
        .toast.show { opacity: 1; transform: translateY(0); }

        /* ── PAGE TRANSITION ── */
        #page-transition {
            position:fixed; inset:0; background:#EEEBE5; z-index:99999;
            pointer-events:none; opacity:1;
            transition:opacity 0.12s cubic-bezier(0.22,1,0.36,1);
        }
        #page-transition.gone { opacity:0; }

        /* ═══════════════════════════
           TABLET (max 900px)
        ═══════════════════════════ */
        @media (max-width: 900px) {
            #wishlist-grid { grid-template-columns: repeat(2, 1fr); column-gap: 20px; row-gap: 40px; }
        }

        /* ═══════════════════════════
           MOBILE (max 600px)
        ═══════════════════════════ */
        @media (max-width: 600px) {
            body { padding-top: 70px; }
            header { padding: 16px 0; }
            .header-container { padding: 0 16px; }
            nav { gap: 14px; }
            nav a { font-size: 10px; letter-spacing: 0.5px; }
            .logo { font-size: 13px; letter-spacing: 2px; }

            .container { padding: 28px 14px 60px; }

            #wishlist-actions {
                justify-content: stretch;
                margin-bottom: 32px;
            }
            .pill-btn {
                flex: 1;
                text-align: center;
                padding: 13px 12px;
                font-size: 9px;
                letter-spacing: 1px;
            }

            #wishlist-grid {
                grid-template-columns: repeat(2, 1fr);
                column-gap: 12px;
                row-gap: 30px;
            }

            /* Always show quick-add on mobile */
            .quick-add-btn { opacity: 1; font-size: 8px; padding: 7px 10px; bottom: 8px; }

            .heart-btn { top: 8px; right: 8px; }

            .view-btn { font-size: 9px; padding: 12px 0; letter-spacing: 1px; border-radius: 6px; min-height: 44px; }

            .cart-sidebar { max-width: 100%; padding: 20px 16px; }
        }

        @media (max-width: 380px) {
            nav { gap: 10px; }
            nav a { font-size: 9px; }
            .logo { font-size: 11px; }
            #wishlist-grid { column-gap: 8px; }
            .pill-btn { font-size: 8px; padding: 12px 8px; }
        }
    </style>
</head>
<body>

<div id="page-transition"></div>
<div id="toast-container"></div>

<header>
    <div class="header-container">
        <nav>
            <a href="index.html" class="nav-link">Archive</a>
            <a href="wishlist.html" style="text-decoration:underline;" class="nav-link">Saved</a>
            <a href="#" onclick="toggleVault()">Vault</a>
        </nav>
        <a href="index.html" class="logo nav-link">SAVED</a>
        <div></div>
    </div>
</header>

<main class="container">
    <div id="wishlist-actions">
        <button onclick="clearSaved()" class="pill-btn">Clear All</button>
        <button onclick="moveAllToVault()" class="pill-btn">Move All to Vault</button>
    </div>

    <div id="wishlist-grid"></div>

    <div id="empty-state" style="display:none; text-align:center; margin-top:100px;">
        <p style="letter-spacing:3px; color:#888; text-transform:uppercase; font-size:10px;">Your archive is empty.</p>
        <a href="index.html" class="view-btn nav-link" style="width:200px; margin:40px auto 0; display:flex;">Return to Shop</a>
    </div>
</main>

<!-- CART SIDEBAR -->
<div id="cart-sidebar" class="cart-sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #eee; padding-bottom:18px; flex-shrink:0;">
        <h2 style="font-size:13px; letter-spacing:2px; margin:0; text-transform:uppercase;">Your Vault</h2>
        <button onclick="toggleVault()" style="font-size:20px; background:none; border:none; cursor:pointer; min-width:44px; min-height:44px; display:flex; align-items:center; justify-content:center;">✕</button>
    </div>
    <div id="cart-items" style="flex-grow:1; overflow-y:auto; padding:16px 0; -webkit-overflow-scrolling:touch;"></div>
    <div style="border-top:1px solid #eee; padding-top:16px; flex-shrink:0;">
        <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:13px; margin-bottom:16px;">
            <span>TOTAL</span><span id="cart-total">0€</span>
        </div>
        <button class="view-btn" onclick="navigateTo('checkout.html')">Checkout</button>
    </div>
</div>
<div class="overlay" id="overlay" onclick="toggleVault()"></div>

<script>
    /* ── PAGE TRANSITIONS ── */
    window.addEventListener('DOMContentLoaded', () => {
        const ov = document.getElementById('page-transition');
        requestAnimationFrame(() => requestAnimationFrame(() => ov.classList.add('gone')));
        document.querySelectorAll('a.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                if (href && !href.startsWith('#')) { e.preventDefault(); navigateTo(href); }
            });
        });
    });

    function navigateTo(href) {
        document.getElementById('page-transition').classList.remove('gone');
        setTimeout(() => { window.location.href = href; }, 130);
    }

    const productData = {
        jeans:      { title:"True Religion 'Joey' Jeans",    price:"119€", img:"https://images1.vinted.net/t/05_020fc_dx7GEawe9mgn4zsFtEXhfAYW/f800/1771499936.webp?s=199378153d9d8bf17c84dc2f824d4278d86e0fb3" },
        polo:       { title:"Polo RL 'Chicago' Polo",         price:"179€", img:"https://i.ebayimg.com/images/g/RSsAAOSwxC1mnr6A/s-l1200.jpg" },
        shoes:      { title:"Maison Margiela 'GAT' Navy",     price:"399€", img:"https://www.maisonmargiela.com/dw/image/v2/AAPK_PRD/on/demandware.static/-/Sites-margiela-master-catalog/default/dwe46c6f08/images/large/S57WS0236_P1895_T6065_D.jpg?sw=1024&q=80" },
        shirt:      { title:"AMI PARIS 'HEART' TEE",          price:"79€",  img:"https://i.ibb.co/YTPs5k3P/IMG-9489.jpg" },
        navyhoodie: { title:"Polo Ralph Lauren Hoodie",       price:"79€",  img:"https://cdn.plick.es/item_image/yaxABJPzkYNLqDOvXGjz8p6543R2nKGrMZgmpoVb/w1125_q90.webp" },
        'shoes-heel': { title:"Maison Margiela 'GAT' Heel",   price:"399€", img:"https://www.maisonmargiela.com/dw/image/v2/AAPK_PRD/on/demandware.static/-/Sites-margiela-master-catalog/default/dw357ce1f5/images/large/S57WS0236_P1895_T6065_R.jpg?sw=1024&q=80" }
    };

    function toggleVault() {
        document.getElementById('cart-sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
        if (document.getElementById('cart-sidebar').classList.contains('open')) renderVaultItems();
    }

    function renderVaultItems() {
        const ci = document.getElementById('cart-items');
        const ct = document.getElementById('cart-total');
        const cart = JSON.parse(localStorage.getItem('vaultCart')) || [];
        if (cart.length === 0) {
            ci.innerHTML = '<p style="text-align:center; font-size:10px; color:#888; letter-spacing:1px; margin-top:40px; text-transform:uppercase;">Vault is empty</p>';
            ct.innerText = "0€"; return;
        }
        ci.innerHTML = cart.map(item => `
            <div style="display:flex; gap:12px; align-items:center; margin-bottom:18px;">
                <img src="${item.img}" style="width:42px; height:42px; object-fit:cover; flex-shrink:0; border-radius:2px;">
                <div>
                    <p style="margin:0; font-size:10px; font-weight:bold; text-transform:uppercase; line-height:1.3;">${item.title}</p>
                    <p style="margin:4px 0 0; font-size:10px; color:#888;">${item.price}</p>
                </div>
            </div>
        `).join('');
        ct.innerText = cart.reduce((s,i) => s+(parseInt(i.price.replace('€',''))||0), 0) + "€";
    }

    function quickAddToVault(id) {
        const item = productData[id];
        if (!item) return;
        let cart = JSON.parse(localStorage.getItem('vaultCart')) || [];
        cart.push(item);
        localStorage.setItem('vaultCart', JSON.stringify(cart));
        showToast("Added to Vault");
    }

    function showToast(msg) {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = 'toast'; t.innerText = msg; c.appendChild(t);
        setTimeout(() => t.classList.add('show'), 100);
        setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 2500);
    }

    function renderWishlist() {
        const savedIds = JSON.parse(localStorage.getItem('vaultWishlist')) || [];
        const grid = document.getElementById('wishlist-grid');
        const empty = document.getElementById('empty-state');
        const actions = document.getElementById('wishlist-actions');

        if (savedIds.length === 0) {
            grid.style.display = 'none';
            actions.style.display = 'none';
            empty.style.display = 'block';
            return;
        }
        grid.style.display = 'grid';
        actions.style.display = 'flex';
        empty.style.display = 'none';

        grid.innerHTML = savedIds.map(id => {
            const item = productData[id]; if (!item) return '';
            return `
                <div class="product-card">
                    <div class="image-container">
                        <button class="heart-btn" onclick="removeFromWishlist('${id}')">❤</button>
                        <a href="product.html?id=${id}" class="nav-link" style="display:block;">
                            <img src="${item.img}" class="product-image" loading="lazy">
                        </a>
                        <button class="quick-add-btn" onclick="quickAddToVault('${id}')">+ Add</button>
                    </div>
                    <h3 style="font-size:12px; margin:0 0 4px; font-weight:700; text-transform:uppercase; line-height:1.3;">${item.title}</h3>
                    <div style="font-weight:bold; font-size:12px; margin-bottom:2px;">${item.price}</div>
                    <a href="product.html?id=${id}" class="view-btn nav-link">View Item</a>
                </div>
            `;
        }).join('');

        // Re-attach nav listeners after render
        grid.querySelectorAll('a.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                if (href && !href.startsWith('#')) { e.preventDefault(); navigateTo(href); }
            });
        });
    }

    function removeFromWishlist(id) {
        let saved = JSON.parse(localStorage.getItem('vaultWishlist')) || [];
        saved = saved.filter(s => s !== id);
        localStorage.setItem('vaultWishlist', JSON.stringify(saved));
        renderWishlist();
        showToast("Item Removed");
    }

    function clearSaved() {
        if (confirm("Empty your saved archive?")) {
            localStorage.setItem('vaultWishlist', JSON.stringify([]));
            renderWishlist();
            showToast("Archive Cleared");
        }
    }

    function moveAllToVault() {
        const ids = JSON.parse(localStorage.getItem('vaultWishlist')) || [];
        if (!ids.length) return;
        let cart = JSON.parse(localStorage.getItem('vaultCart')) || [];
        ids.forEach(id => { if (productData[id]) cart.push(productData[id]); });
        localStorage.setItem('vaultCart', JSON.stringify(cart));
        localStorage.setItem('vaultWishlist', JSON.stringify([]));
        showToast("Vault Updated");
        setTimeout(() => navigateTo('index.html'), 800);
    }

    renderWishlist();
</script>
</body>
</html>
